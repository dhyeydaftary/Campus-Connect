[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=app --cov-report=term-missing --cov-fail-under=72 --strict-markers -v
markers =
    critical: Critical security tests
    auth: Authorization tests
    cascade: Cascading operation tests
