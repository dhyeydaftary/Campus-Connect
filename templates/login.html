<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusConnect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script defer src="{{ url_for('static', filename='js/login.js') }}"></script>

</head>

<body class="min-h-screen flex items-center justify-center p-4 gradient-soft text-slate-900">

<div class="w-full max-w-md">
    <div class="bg-white rounded-lg border border-slate-200 shadow-elevated overflow-hidden">
        <div class="p-8">

            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold mb-2">
                    <i data-lucide="graduation-cap" class="inline-block h-8 w-8 text-indigo-600"></i>
                    Campus Connect
                </h1>
                <p class="text-slate-500">Welcome back! Please login to your account.</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">

                <div>
                    <label for="email" class="text-sm font-medium">Email Address</label>
                    <div class="relative mt-1">
                        <i data-lucide="mail"
                            class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400"></i>
                        <input
                            id="email"
                            type="email"
                            required
                            class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30"
                            placeholder="your.erno@mail.ljku.edu.in"
                        >
                    </div>
                </div>

                <div>
                    <label for="password" class="text-sm font-medium">Password</label>
                    <div class="relative mt-1">
                        <i data-lucide="lock"
                            class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400"></i>
                        <input
                            id="password"
                            type="password"
                            required
                            class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30"
                            placeholder="Enter your password"
                        >
                    </div>
                </div>

                <button
                    type="submit"
                    id="login-btn"
                    class="w-full h-11 gradient-primary text-white rounded-md flex items-center justify-center gap-2 disabled:opacity-50"
                >
                    <i data-lucide="log-in" class="h-4 w-4" id="btn-icon"></i>
                    <span id="btn-text">Login</span>
                </button>

                <div class="text-center">
                    <a href="#" class="text-sm text-indigo-600 hover:underline">Forgot Password?</a>
                </div>

                <hr class="my-6 border-slate-200">

                <div class="text-center">
                    <p class="text-slate-500 text-sm">
                        Don't have an account? 
                        <a href="/signup" class="text-indigo-600 font-semibold hover:underline">Sign Up</a>
                    </p>
                </div>

            </form>

        </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
