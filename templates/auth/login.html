<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusConnect</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
    <script defer src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/pages/login.js') }}"></script>

</head>

<body class="min-h-screen flex items-center justify-center p-4 gradient-soft text-slate-900">

    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg border border-slate-200 shadow-elevated">
            <div class="p-8">

                <!-- Header -->
                <div class="text-center mb-6">
                    <h1 class="text-3xl font-bold mb-2">
                        <i class="fa-solid fa-graduation-cap text-3xl text-indigo-600"></i>
                        Campus Connect
                    </h1>
                    <p class="text-slate-500" id="login-subtitle">Student Login</p>
                </div>

                <!-- Role Selector -->
                <div class="flex p-1 bg-slate-100 rounded-lg mb-6">
                    <button type="button"
                        class="role-btn flex-1 py-2 text-sm font-medium rounded-md bg-white shadow-sm text-indigo-600 transition-all"
                        data-role="student">
                        Student
                    </button>
                    <button type="button"
                        class="role-btn flex-1 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-all"
                        data-role="admin">
                        Admin
                    </button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="space-y-4">

                    <!-- STUDENT LOGIN FLOW -->
                    <div id="student-flow" class="space-y-4">

                        <!-- Branch & Enrollment -->
                        <div>
                            <label for="branch" class="text-sm font-medium">Branch</label>
                            <div class="relative mt-1">
                                <i class="fa-solid fa-book absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <select id="major" name="major" required
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30 appearance-none">
                                    <option value="" disabled selected>Select your branch</option>
                                    <option value="AIDS">AIDS</option>
                                    <option value="AIML">AIML</option>
                                    <option value="CE">CE</option>
                                    <option value="CEA">CEA</option>
                                    <option value="CS&IT">CS & IT</option>
                                    <option value="CSD">CSD</option>
                                    <option value="CSE">CSE</option>
                                    <option value="CSE-CS">CSE-CS</option>
                                    <option value="CSE-CYBER">CSE-CYBER</option>
                                    <option value="CSE-DS">CSE-DS</option>
                                    <option value="CSE-AI">CSE-AI</option>
                                    <option value="CSE-BIO">CSE-BIO</option>
                                    <option value="BIOTECH">BIOTECH</option>
                                    <option value="CST">CST</option>
                                    <option value="IT">IT</option>
                                    <option value="MA&CP">MA & CP</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label for="enrollment" class="text-sm font-medium">Enrollment Number</label>
                            <div class="relative mt-1 z-20">
                                <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="enrollment" type="text" required disabled
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30 disabled:opacity-60 disabled:cursor-not-allowed"
                                    placeholder="Select branch first" autocomplete="off">
                                <!-- Suggestions Dropdown -->
                                <div id="suggestions-box"
                                    class="absolute z-10 w-full bg-white border border-slate-200 rounded-md shadow-lg mt-1 hidden max-h-48 overflow-y-auto">
                                </div>
                            </div>
                        </div>

                        <!-- Auto-filled Fields (Read Only) -->
                        <div>
                            <label for="student-name" class="text-sm font-medium">Student Name</label>
                            <div class="relative mt-1">
                                <i
                                    class="fa-solid fa-id-card absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="student-name" type="text" readonly
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-100 pl-10 pr-3 text-sm text-slate-500 cursor-not-allowed"
                                    placeholder="Auto-filled">
                            </div>
                        </div>

                        <div>
                            <label for="college-email" class="text-sm font-medium">College Email</label>
                            <div class="relative mt-1">
                                <i
                                    class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="college-email" type="text" readonly
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-100 pl-10 pr-3 text-sm text-slate-500 cursor-not-allowed"
                                    placeholder="Auto-filled">
                            </div>
                        </div>

                        <!-- Student Password (Hidden initially) -->
                        <div id="student-password-container" class="hidden">
                            <div class="flex justify-between items-center">
                                <label for="student-password" class="text-sm font-medium">Password</label>
                                <a href="#" id="forgot-password-link" class="text-xs text-indigo-600 hover:underline"
                                    tabindex="-1">Forgot?</a>
                            </div>
                            <div class="relative mt-1">
                                <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="student-password" type="password"
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30"
                                    placeholder="Enter your password">
                            </div>
                        </div>
                    </div>

                    <!-- ADMIN LOGIN FLOW (Hidden initially) -->
                    <div id="admin-flow" class="space-y-4 hidden">
                        <div>
                            <label for="admin-email" class="text-sm font-medium">Admin Email</label>
                            <div class="relative mt-1">
                                <i
                                    class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="admin-email" type="email" required disabled
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30 disabled:opacity-60"
                                    placeholder="admin@ljku.edu.in">
                            </div>
                        </div>

                        <div>
                            <label for="admin-password" class="text-sm font-medium">Password</label>
                            <div class="relative mt-1">
                                <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="admin-password" type="password" required disabled
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30 disabled:opacity-60"
                                    placeholder="Enter admin password">
                            </div>
                        </div>
                    </div>

                    <!-- OTP FLOW (Hidden initially) -->
                    <div id="otp-flow" class="space-y-4 hidden">
                        <div class="bg-indigo-50 p-3 rounded-md text-sm text-indigo-700 mb-2">
                            <i class="fa-solid fa-paper-plane mr-1 align-middle"></i>
                            OTP sent to <span id="masked-email" class="font-semibold">...</span>
                        </div>

                        <div>
                            <label for="otp" class="text-sm font-medium">Enter OTP</label>
                            <div class="relative mt-1">
                                <i class="fa-solid fa-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input id="otp" type="text" maxlength="6"
                                    class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30 tracking-widest font-mono"
                                    placeholder="000000">
                            </div>
                        </div>

                        <div class="text-center text-xs flex items-center justify-center gap-2">
                            <span id="otp-timer" class="text-slate-500 font-mono text-sm hidden"></span>
                            <button type="button" id="resend-btn"
                                class="text-indigo-600 hover:underline disabled:text-slate-400 disabled:no-underline disabled:cursor-not-allowed">Resend
                                OTP</button>
                        </div>
                    </div>

                    <button type="submit" id="login-btn"
                        class="w-full h-11 gradient-primary text-white rounded-md flex items-center justify-center gap-2 disabled:opacity-50"
                        disabled>
                        <i class="fa-solid fa-arrow-right" id="btn-icon"></i>
                        <span id="btn-text">Continue</span>
                    </button>

                    <hr class="my-6 border-slate-200">

                    <div class="text-center" id="login-footer">
                        <p class="text-slate-500 text-sm">
                            Having trouble?
                            <a href="#" class="text-indigo-600 font-semibold hover:underline">Contact Admin</a>
                        </p>
                    </div>

                </form>

            </div>
        </div>
    </div>
    <div id="toast-container" class="fixed top-4 right-4 z-[200] w-full max-w-md space-y-3 pointer-events-none"></div>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-900">Reset Password</h3>
                <button id="close-forgot-modal" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="forgot-password-form">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Enrollment No. or Email</label>
                    <input type="text" id="fp-identifier" required
                        class="w-full h-11 rounded-md border border-slate-200 px-3 text-sm focus:ring-2 focus:ring-indigo-500/30"
                        placeholder="Enter your ID">
                    <p id="fp-status" class="text-xs text-gray-500 mt-2"></p>
                </div>

                <button type="submit" id="fp-btn"
                    class="w-full h-11 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-700 transition mt-4">
                    <span id="fp-btn-text">Send Reset Link</span>
                    <i id="fp-btn-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>
        </div>
    </div>

</body>

</html>
