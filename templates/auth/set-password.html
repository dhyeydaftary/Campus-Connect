<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password - Campus Connect</title>

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
    <script defer src="{{ url_for('static', filename='js/pages/set-password.js') }}"></script>

</head>

<body class="min-h-screen flex items-center justify-center p-4 gradient-soft text-slate-900">

    <div class="w-full max-w-md animate-fade-in-up">
        <div class="bg-white rounded-2xl border border-slate-200/80 shadow-elevated overflow-hidden">
            <div class="p-8">

                <!-- Header -->
                <div class="text-center mb-8 animate-fade-in delay-100">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-green-50 mb-4">
                        <i class="fa-solid fa-user-check text-2xl text-green-600"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-900">Welcome, {{ user_name }}!</h1>
                    <p class="text-slate-500 text-sm mt-1">To secure your account, please set a permanent password.</p>
                </div>

                <form id="set-password-form" class="space-y-4 animate-fade-in delay-200">
                    <div>
                        <label for="new-password" class="text-sm font-medium text-slate-700">New Password</label>
                        <div class="relative mt-1.5">
                            <i
                                class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input id="new-password" type="password" required
                                class="h-11 w-full rounded-lg border border-slate-200 bg-slate-50/80 pl-10 pr-3 text-sm input-glow transition-all duration-200"
                                placeholder="Minimum 6 characters">
                        </div>
                    </div>

                    <div>
                        <label for="confirm-password" class="text-sm font-medium text-slate-700">Confirm
                            Password</label>
                        <div class="relative mt-1.5">
                            <i
                                class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input id="confirm-password" type="password" required
                                class="h-11 w-full rounded-lg border border-slate-200 bg-slate-50/80 pl-10 pr-3 text-sm input-glow transition-all duration-200"
                                placeholder="Re-enter your password">
                        </div>
                    </div>

                    <button type="submit" id="submit-btn"
                        class="w-full h-11 gradient-primary text-white rounded-lg font-medium flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-indigo-500/25 active:scale-[0.98] transition-all duration-200 disabled:opacity-50">
                        <span id="btn-text">Set Password & Continue</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

</body>

</html>
