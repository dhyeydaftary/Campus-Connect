<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password - Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script defer src="{{ url_for('static', filename='js/pages/set-password.js') }}"></script>
</head>

<body class="bg-gray-50">
    {% with user=user, user_name=user_name %}
    {% include 'partials/_navbar.html' %}
    {% endwith %}

    <div class="min-h-screen flex items-center justify-center pt-16 px-4">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg border border-slate-200 shadow-lg p-8">
                <div class="text-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome, {{ user_name }}!</h1>
                    <p class="text-slate-500">To secure your account, please set a permanent password.</p>
                </div>
                <form id="set-password-form" class="space-y-4">
                    <div>
                        <label for="new-password" class="text-sm font-medium text-gray-700">New Password</label>
                        <input id="new-password" type="password" required
                            class="h-11 w-full mt-1 rounded-md border border-slate-200 bg-slate-50 px-3 text-sm focus:ring-2 focus:ring-indigo-500/30"
                            placeholder="Minimum 6 characters">
                    </div>
                    <div>
                        <label for="confirm-password" class="text-sm font-medium text-gray-700">Confirm Password</label>
                        <input id="confirm-password" type="password" required
                            class="h-11 w-full mt-1 rounded-md border border-slate-200 bg-slate-50 px-3 text-sm focus:ring-2 focus:ring-indigo-500/30"
                            placeholder="Re-enter your password">
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full h-11 bg-indigo-600 text-white rounded-md flex items-center justify-center gap-2 hover:bg-indigo-700 transition disabled:opacity-60">
                        <span id="btn-text">Set Password & Continue</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
