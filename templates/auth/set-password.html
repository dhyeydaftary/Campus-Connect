<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password — Campus Connect</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <script defer src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/pages/set-password.js') }}"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 gradient-soft text-slate-900">

    <div class="w-full max-w-md animate-fade-in-up">

        <!-- Card -->
        <div class="auth-card bg-white overflow-hidden">

            <!-- Top accent bar (green for welcome/onboarding) -->
            <div
                style="height:3px;background:linear-gradient(90deg,#16a34a 0%,#22c55e 100%);border-radius:16px 16px 0 0;">
            </div>

            <div class="p-8">

                <!-- Header -->
                <div class="text-center mb-7 animate-fade-in delay-100">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4"
                        style="background:hsl(142,72%,29%);box-shadow:0 4px 14px rgba(22,163,74,0.22);">
                        <i class="fa-solid fa-user-check text-white text-xl"></i>
                    </div>
                    <h1 class="auth-title">Welcome, {{ user_name }}!</h1>
                    <p class="auth-subtitle">Secure your account with a permanent password.</p>
                </div>

                <!-- Info notice -->
                <div class="rounded-lg p-3.5 mb-5 animate-fade-in delay-100"
                    style="background:hsl(142,72%,97%);border:1.5px solid hsl(142,72%,88%);">
                    <p class="text-xs leading-relaxed"
                        style="color:hsl(142,60%,26%);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;">
                        <i class="fa-solid fa-circle-info mr-1.5"></i>
                        You are signing in for the first time. Please set a password to continue.
                    </p>
                </div>

                <!-- Set Password Form -->
                <form id="set-password-form" class="space-y-4 animate-fade-in delay-200">

                    <!-- New password -->
                    <div>
                        <label for="new-password" class="text-sm font-medium text-slate-700 block mb-1.5">New
                            Password</label>
                        <div class="relative">
                            <i
                                class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                            <input id="new-password" type="password" required
                                class="h-11 w-full rounded-lg border border-slate-200 bg-slate-50/80 pl-10 pr-3 text-sm input-glow transition-all duration-200"
                                placeholder="Minimum 6 characters">
                        </div>
                    </div>

                    <!-- Confirm password -->
                    <div>
                        <label for="confirm-password" class="text-sm font-medium text-slate-700 block mb-1.5">Confirm
                            Password</label>
                        <div class="relative">
                            <i
                                class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"></i>
                            <input id="confirm-password" type="password" required
                                class="h-11 w-full rounded-lg border border-slate-200 bg-slate-50/80 pl-10 pr-3 text-sm input-glow transition-all duration-200"
                                placeholder="Re-enter your password">
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn"
                        class="w-full h-11 text-white rounded-lg font-medium flex items-center justify-center gap-2 transition-all duration-200 disabled:opacity-50 mt-1"
                        style="background:hsl(142,72%,29%);box-shadow:0 4px 14px rgba(22,163,74,0.22);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.875rem;font-weight:600;">
                        <i class="fa-solid fa-shield-halved text-sm"></i>
                        <span id="btn-text">Set Password &amp; Continue</span>
                    </button>

                </form>
            </div>
        </div>

        <!-- Attribution -->
        <p class="text-center text-xs mt-5"
            style="color:hsl(220,10%,62%);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;">
            &copy; {{ config.get('CURRENT_YEAR', 2025) }} Campus Connect &nbsp;&middot;&nbsp; All rights reserved
        </p>

    </div>

    <div id="toast-container"
        style="position:fixed;top:0;left:0;right:0;z-index:9999;padding:12px 12px 0;pointer-events:none;display:flex;flex-direction:column;gap:8px;">
    </div>

</body>

</html>
