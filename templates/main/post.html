<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Campus Connect</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script defer src="{{ url_for('static', filename='js/features/post-utils.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/features/feed-loader.js') }}"></script>
</head>

<body class="bg-gray-50">
    {% include 'partials/_navbar.html' %}

    <div class="py-8 px-4">
        {% include 'partials/_post_feed.html' %}
    </div>

    <!-- Comment Modal -->
    <div id="comment-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-white w-full max-w-lg rounded-lg overflow-hidden max-h-[80vh] flex flex-col shadow-xl"
            onclick="event.stopPropagation()">
            <header class="p-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="font-bold text-gray-900 text-lg">Comments</h3>
                <button onclick="document.getElementById('comment-modal').style.display='none'"
                    class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </header>
            <div id="modal-comments-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-4 border-t border-gray-200 flex gap-3">
                <img src="https://ui-avatars.com/api/?name={{ user_name }}&background=6366f1&color=fff&size=32"
                    alt="Your avatar" class="w-8 h-8 rounded-full">
                <input id="comment-input" type="text" placeholder="Write a comment..."
                    class="flex-1 bg-gray-100 rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                    onkeydown="if(event.key==='Enter') submitComment()">
                <button onclick="submitComment()"
                    class="text-indigo-600 hover:text-indigo-700 font-semibold text-sm px-3 transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50"
        onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="bg-white w-full max-w-md rounded-xl shadow-xl flex flex-col max-h-[80vh] mx-4">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="font-bold text-lg text-gray-900">Share Post</h3>
                <button onclick="document.getElementById('share-modal').classList.add('hidden')"
                    class="text-gray-500 hover:text-gray-700"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-4 border-b border-gray-100">
                <input type="text" id="share-search" placeholder="Search connections..."
                    class="w-full px-4 py-2 bg-gray-100 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>
            <div id="share-connections-list" class="flex-1 overflow-y-auto p-2 space-y-1 min-h-[200px]"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            window.feedLoader = new FeedLoader('/api/posts/{{ post_id }}', 'post-feed');
            window.feedLoader.loadPosts();
        });

        async function submitComment() {
            const input = document.getElementById('comment-input');
            const postId = input.dataset.postId;
            const text = input.value.trim();

            if (!text || !postId) return;

            try {
                const response = await fetch(`/api/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                if (!response.ok) throw new Error('Failed to post comment');
                input.value = '';
                window.feedLoader.openComments(0); // 0 because there's only one post
            } catch (error) { console.error(error); }
        }
    </script>
</body>

</html>
