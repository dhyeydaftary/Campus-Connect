<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages - Campus Connect</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .chat-bg {
            /*background-color: #ced5e5;*/
            background-image: url("/static/images/chat-bg.jpg");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col overflow-hidden" data-user-id="{{ user.id }}">

    <!-- Navbar -->
    {% include 'partials/_navbar.html' %}

    <!-- Main Layout -->
    <div class="flex-1 max-w-screen-2xl w-full mx-auto bg-white shadow-lg overflow-hidden flex h-[calc(100vh-64px)]">

        <!-- Sidebar (Conversation List) -->
        <div id="sidebar-panel"
            class="w-full md:w-[350px] lg:w-[400px] flex flex-col border-r border-gray-200 bg-white h-full z-10">
            <!-- Sidebar Header -->
            <div class="px-4 py-3 border-b border-gray-200 bg-gray-50 flex items-center justify-between shrink-0">
                <h1 class="text-xl font-bold text-gray-800">Messages</h1>
                <div class="flex gap-2">
                    <button id="compose-btn" class="p-2 text-gray-500 hover:bg-gray-200 rounded-full transition"
                        title="New Chat">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="px-4 py-2 border-b border-gray-100 shrink-0">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="conversation-search" placeholder="Search conversations..."
                        class="w-full pl-9 pr-4 py-2 bg-gray-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
            </div>

            <!-- Conversation List -->
            <div id="conversation-list" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Loading State -->
                <div class="p-4 text-center text-gray-500 text-sm">
                    <i class="fas fa-spinner fa-spin mr-2"></i> Loading chats...
                </div>
            </div>
        </div>

        <!-- Chat Window -->
        <div id="chat-panel" class="hidden md:flex flex-1 flex-col bg-white h-full relative w-full">

            <!-- Empty State -->
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-0">
                <div class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                    <i class="fas fa-comments text-4xl text-indigo-500"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">Your Messages</h2>
                <p class="text-gray-500 mt-2">Select a conversation to start chatting</p>
            </div>

            <!-- Active Chat Container -->
            <div id="active-chat-container" class="hidden flex-col h-full w-full z-10">

                <!-- Chat Header -->
                <div
                    class="px-4 py-3 border-b border-gray-200 bg-white flex items-center gap-3 shrink-0 shadow-sm z-20">
                    <button id="back-button"
                        class="md:hidden p-2 -ml-2 mr-2 text-gray-600 hover:bg-gray-100 rounded-full flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </button>

                    <div class="relative">
                        <img id="chat-header-avatar" src="" alt="User"
                            class="w-10 h-10 rounded-full object-cover border border-gray-200">
                    </div>

                    <div class="flex-1 min-w-0">
                        <h3 id="chat-header-name" class="font-bold text-gray-900 truncate">User Name</h3>
                        <p id="chat-header-info" class="text-xs text-gray-500 truncate hidden">Click to view profile</p>
                    </div>

                    <button class="p-2 text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>

                <!-- Messages Area -->
                <div id="messages-area" class="flex-1 overflow-y-auto custom-scrollbar p-4 chat-bg space-y-4">
                    <!-- Messages injected here -->
                </div>

                <!-- Typing Indicator -->
                <div id="typing-indicator"
                    class="hidden px-4 py-1 text-xs text-gray-500 bg-white/80 backdrop-blur-sm absolute bottom-[70px] left-0 w-full border-t border-gray-100">
                    Typing...
                </div>

                <!-- Attachment Preview -->
                <div id="attachment-preview" class="hidden px-4 py-2 bg-gray-50 border-t border-gray-200 shrink-0">
                    <!-- Injected by JS -->
                </div>

                <!-- Input Area -->
                <div class="p-3 bg-gray-50 border-t border-gray-200 shrink-0">
                    <div class="flex items-end gap-2 max-w-4xl mx-auto">
                        <input type="file" id="chat-file-input" class="hidden" accept="image/*,.pdf">
                        <button id="attach-btn"
                            class="p-3 text-gray-500 hover:text-indigo-600 hover:bg-gray-200 rounded-full transition">
                            <i class="fas fa-paperclip"></i>
                        </button>

                        <div
                            class="flex-1 bg-white rounded-2xl border border-gray-300 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 transition flex items-center px-4 py-2">
                            <textarea id="message-input" rows="1" placeholder="Type a message..."
                                class="w-full bg-transparent border-none outline-none text-sm resize-none max-h-32 py-1 custom-scrollbar"></textarea>
                        </div>

                        <button id="send-button"
                            class="p-3 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 shadow-md transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal"
        class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity opacity-0">
        <div class="bg-white w-full max-w-md mx-4 rounded-xl shadow-xl transform scale-95 transition-transform duration-200 flex flex-col max-h-[80vh] relative"
            onclick="event.stopPropagation()">
            <!-- Header -->
            <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">New Message</h3>
                <button id="close-compose"
                    class="text-gray-400 hover:text-gray-600 transition p-1 rounded-full hover:bg-gray-100">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Search Input -->
            <div class="p-4 border-b border-gray-100">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="compose-search" placeholder="Search people..."
                        class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
                </div>
            </div>

            <!-- Results List -->
            <div id="compose-results" class="flex-1 overflow-y-auto custom-scrollbar p-2 min-h-[200px]">
                <div class="text-center text-gray-400 mt-8 text-sm">Type to search for people</div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/features/messages.js') }}"></script>
</body>

</html>
