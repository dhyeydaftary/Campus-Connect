{% extends "admin/layout.html" %}
{% block title %}Logs | Admin{% endblock %}
{% block content %}

<!-- Top Navbar -->
<header class="top-navbar">
    <h1 class="page-title">Admin Logs</h1>
    <div class="navbar-right">
        <div class="admin-profile">
            <div class="admin-avatar">AD</div>
            <div class="admin-info">
                <span class="admin-name">Admin User</span>
                <span class="admin-role">Super Admin</span>
            </div>
        </div>
    </div>
</header>
<!-- Content Area -->
<div class="content-area">
    <div class="card">
        <div class="card-header flex items-center justify-between">
            <h2 class="card-title">Activity Logs</h2>
            <div class="flex gap-4">
                <input type="text" class="form-input" style="width: 250px;" placeholder="Search logs..."
                    id="search-input">
                <select class="form-select" style="width: 180px;" id="action-filter">
                    <option value="">All Actions</option>
                    <option value="Toggle User">User Status Changed</option>
                    <option value="Create Event">Event Created</option>
                    <option value="Create Announcement">Announcement Created</option>
                </select>
                <button class="btn btn-secondary" onclick="downloadLogs()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download Logs
                </button>
            </div>
        </div>
        <div class="card-body" style="padding: 0; max-height: 600px; overflow-y: auto;">
            <div class="loading-spinner" id="logs-loading">
                <div class="spinner"></div>
            </div>
            <table class="data-table" id="logs-table" style="display: none;">
                <thead style="position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Target</th>
                        <th>Admin</th>
                        <th>IP Address</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin/logs.js') }}"></script>
{% endblock %}
