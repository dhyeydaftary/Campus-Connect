{% extends "layouts/admin_base.html" %}
{% block title %}Activity Logs | Admin{% endblock %}
{% block header_title %}Activity Logs{% endblock %}
{% block content %}

<!-- Content Area -->
<div class="content-area">
    <div class="card">
        <div class="card-header flex items-center justify-between">
            <h2 class="card-title">Activity Logs</h2>
            <div class="flex gap-4">
                <input type="text" class="form-input" style="width: 250px;" placeholder="Search logs..."
                    id="search-input">
                <select class="form-select" style="width: 180px;" id="action-filter">
                    <option value="">All Actions</option>
                    <option value="Toggle User">User Status Changed</option>
                    <option value="Create Event">Event Created</option>
                    <option value="Create Announcement">Announcement Created</option>
                </select>
                <button class="btn btn-secondary" onclick="downloadLogs()">
                    <i class="fa-solid fa-download"></i>
                    Download Logs
                </button>
            </div>
        </div>
        <div class="card-body" style="padding: 0; max-height: 600px; overflow-y: auto;">
            <div class="loading-spinner" id="logs-loading">
                <div class="spinner"></div>
            </div>
            <table class="data-table" id="logs-table" style="display: none;">
                <thead style="position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Target</th>
                        <th>Admin</th>
                        <th>IP Address</th>
                    </tr>
                </thead>
                <tbody id="logs-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin/logs.js') }}"></script>
{% endblock %}
