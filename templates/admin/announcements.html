{% extends "admin/layout.html" %}
{% block title %}Announcements | Admin{% endblock %}
{% block header_title %}Announcements{% endblock %}
{% block content %}

<!-- Content Area -->
<div class="content-area">
    <!-- Create Announcement -->
    <div class="card mb-6">
        <div class="card-header">
            <h2 class="card-title">Create New Announcement</h2>
        </div>
        <div class="card-body">
            <form id="announcement-form">
                <div class="form-group">
                    <label class="form-label" for="announcement-text">Announcement Message</label>
                    <textarea class="form-textarea" id="announcement-text" placeholder="Write your announcement here..."
                        style="min-height: 150px;" required></textarea>
                </div>
                <div class="flex justify-between items-center">
                    <span style="font-size: 0.875rem; color: var(--text-secondary);">
                        <span id="char-count">0</span> / 500 characters
                    </span>
                    <button type="submit" class="btn btn-primary" id="publish-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                        Publish Announcement
                    </button>
                </div>
            </form>
        </div>
    </div>
    <!-- Past Announcements -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Past Announcements</h2>
        </div>
        <div class="card-body" id="announcements-list">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin/announcements.js') }}"></script>
{% endblock %}
