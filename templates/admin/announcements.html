{% extends "admin/layout.html" %}
{% block title %}Announcements | Admin{% endblock %}
{% block content %}

<!-- Top Navbar -->
<header class="top-navbar">
    <h1 class="page-title">Announcements</h1>
    <div class="navbar-right">
        <div class="admin-profile">
            <div class="admin-avatar">AD</div>
            <div class="admin-info">
                <span class="admin-name">Admin User</span>
                <span class="admin-role">Super Admin</span>
            </div>
        </div>
    </div>
</header>
<!-- Content Area -->
<div class="content-area">
    <!-- Create Announcement -->
    <div class="card mb-6">
        <div class="card-header">
            <h2 class="card-title">Create New Announcement</h2>
        </div>
        <div class="card-body">
            <form id="announcement-form">
                <div class="form-group">
                    <label class="form-label" for="announcement-text">Announcement Message</label>
                    <textarea class="form-textarea" id="announcement-text" placeholder="Write your announcement here..."
                        style="min-height: 150px;" required></textarea>
                </div>
                <div class="flex justify-between items-center">
                    <span style="font-size: 0.875rem; color: var(--text-secondary);">
                        <span id="char-count">0</span> / 500 characters
                    </span>
                    <button type="submit" class="btn btn-primary" id="publish-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m3 11 18-5v12L3 14v-3z" />
                        </svg>
                        Publish Announcement
                    </button>
                </div>
            </form>
        </div>
    </div>
    <!-- Past Announcements -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Past Announcements</h2>
        </div>
        <div class="card-body" id="announcements-list">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin/announcements.js') }}"></script>
{% endblock %}
