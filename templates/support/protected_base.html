<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Campus Connect | Support{% endblock %}</title>
    <!-- Favicon (Emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">

    <!-- Minimal Header for Protected Pages -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="{{ url_for('support.help_center') }}" class="flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-medium transition-colors group">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                <span class="hidden sm:inline">Help Center</span>
            </a>
            
            <div class="font-bold text-lg text-slate-900 flex-1 text-center">
                {% block header_title %}Support{% endblock %}
            </div>
            
            <div class="text-right">
                 <a href="{{ '/home' if session.get('user_id') else url_for('auth.login_page') }}" class="text-sm font-medium text-slate-400 hover:text-slate-700 transition-colors">
                     Cancel
                 </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8 bg-gradient-to-b from-slate-50 to-white">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
