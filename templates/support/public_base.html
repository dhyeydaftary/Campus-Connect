<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Campus Connect | Support{% endblock %}</title>
    <!-- Favicon (Emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main_tailwind.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">

    <!-- Minimal Header for Public Pages -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="{{ url_for('main.home') }}" class="flex items-center gap-2 font-bold text-xl text-gray-900 group focus:outline-none">
                <i class="fas fa-graduation-cap text-indigo-600"></i>
                <span class="hidden md:inline group-hover:text-indigo-600 transition-colors">Campus Connect</span>
                <span class="text-sm font-normal text-slate-500 ml-2 border-l border-slate-300 pl-2">Knowledge Base & Support</span>
            </a>
            
            <a href="{{ '/home' if session.get('user_id') else url_for('auth.login_page') }}" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors flex items-center gap-2">
                Back to App <i class="fa-solid fa-arrow-right text-xs"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-16 px-4 mt-auto text-center">
        <h3 class="text-xl font-bold text-slate-900 mb-2">Still need help?</h3>
        <p class="text-slate-500 mb-6 max-w-md mx-auto">Can't find the answer you're looking for? Our support team is here to assist you.</p>
        <a href="{{ url_for('support.contact_support') }}" class="inline-flex items-center justify-center px-8 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 shadow-sm hover:shadow-md transition-all duration-200 transform hover:-translate-y-0.5">
            Contact Support
        </a>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
