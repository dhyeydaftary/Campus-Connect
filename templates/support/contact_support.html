<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Contact Support - Campus Connect</title>
    <!-- Favicon (Emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .back-btn {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            z-index: 100;
            width: 2.75rem;
            height: 2.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            background: white;
            color: #475569;
            text-decoration: none;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px hsl(221 30% 50% / 0.08);
            transition: all 0.25s ease;
        }

        .back-btn:hover {
            background: #f1f5f9;
            transform: translateX(-2px);
            color: #1e293b;
        }

        .dropzone-active {
            border-color: #818cf8 !important;
            background-color: #eef2ff !important;
        }

        .dropzone-active .upload-icon {
            transform: scale(1.1) translateY(-2px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-preview-enter {
            animation: slideUp 0.3s ease-out both;
        }

        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out both;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }
    </style>
</head>

<body>
    <a href="{{ url_for('main.home') }}" class="back-btn" title="Back to Home">
        <i class="fa-solid fa-arrow-left text-base"></i>
    </a>

    <div class="max-w-2xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
        <div class="mb-10 text-center animate-fade-in-up">
            <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-headset text-xl text-indigo-600"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">How can we help?</h1>
            <p class="text-slate-500 text-sm sm:text-base max-w-md mx-auto leading-relaxed">Submit a ticket and our
                support team will get back to you within 24–48 hours.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8 animate-fade-in-up delay-100">
            <form id="contact-support-form" enctype="multipart/form-data" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div class="group">
                        <label for="name"
                            class="block text-sm font-semibold text-slate-700 mb-1.5 group-focus-within:text-indigo-600 transition-colors">Full
                            Name <span class="text-red-500">*</span></label>
                        <input type="text" id="name" name="name" required
                            class="input-glow w-full h-11 rounded-xl border border-slate-200 px-4 text-sm text-slate-900 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-indigo-500/15 focus:border-indigo-500 transition-all duration-200 outline-none"
                            placeholder="John Doe" value="{{ user.full_name if user else '' }}">
                    </div>
                    <div class="group">
                        <label for="email"
                            class="block text-sm font-semibold text-slate-700 mb-1.5 group-focus-within:text-indigo-600 transition-colors">Email
                            Address <span class="text-red-500">*</span></label>
                        <input type="email" id="email" name="email" required
                            class="input-glow w-full h-11 rounded-xl border border-slate-200 px-4 text-sm text-slate-900 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-indigo-500/15 focus:border-indigo-500 transition-all duration-200 outline-none"
                            placeholder="john@example.com" value="{{ user.email if user else '' }}">
                    </div>
                </div>
                <div class="group">
                    <label for="category"
                        class="block text-sm font-semibold text-slate-700 mb-1.5 group-focus-within:text-indigo-600 transition-colors">What
                        can we help you with? <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <select id="category" name="category" required
                            class="input-glow appearance-none w-full h-11 rounded-xl border border-slate-200 px-4 pr-10 text-sm text-slate-900 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-indigo-500/15 focus:border-indigo-500 transition-all duration-200 cursor-pointer outline-none">
                            <option value="" disabled selected>Select a relevant category...</option>
                            <option value="account">Account & Login Issues</option>
                            <option value="content">Content Removal / Copyright</option>
                            <option value="events">Events & Ticketing</option>
                            <option value="feedback">General Feedback</option>
                            <option value="other">Other Inquiry</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3.5 text-slate-400">
                            <i class="fas fa-chevron-down text-xs"></i></div>
                    </div>
                </div>
                <div class="group">
                    <label for="subject"
                        class="block text-sm font-semibold text-slate-700 mb-1.5 group-focus-within:text-indigo-600 transition-colors">Subject
                        line <span class="text-red-500">*</span></label>
                    <input type="text" id="subject" name="subject" required
                        class="input-glow w-full h-11 rounded-xl border border-slate-200 px-4 text-sm text-slate-900 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-indigo-500/15 focus:border-indigo-500 transition-all duration-200 outline-none"
                        placeholder="Brief summary of your issue">
                </div>
                <div class="group">
                    <div class="flex justify-between items-end mb-1.5">
                        <label for="message"
                            class="block text-sm font-semibold text-slate-700 group-focus-within:text-indigo-600 transition-colors">Detailed
                            Message <span class="text-red-500">*</span></label>
                        <span id="char-count"
                            class="text-xs font-semibold px-2 py-0.5 rounded-md bg-slate-100 text-slate-400 tabular-nums transition-colors">0
                            / 1000</span>
                    </div>
                    <textarea id="message" name="message" required rows="5" maxlength="1000"
                        class="input-glow w-full rounded-xl border border-slate-200 p-4 text-sm text-slate-900 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-indigo-500/15 focus:border-indigo-500 transition-all duration-200 resize-y leading-relaxed outline-none"
                        placeholder="Please provide as much detail as possible to help us investigate and resolve your issue quickly..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Attachment <span
                            class="text-slate-400 font-normal">(Optional)</span></label>
                    <div class="relative border-2 border-dashed border-slate-200 rounded-xl p-6 text-center hover:border-indigo-300 hover:bg-indigo-50/30 transition-all duration-300 cursor-pointer group"
                        id="file-dropzone">
                        <input type="file" id="file" name="file"
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                            accept=".png,.jpg,.jpeg,.gif,.pdf,.txt,.doc,.docx">
                        <div class="text-slate-500 upload-icon transition-transform duration-300" id="file-label">
                            <div
                                class="w-12 h-12 mx-auto bg-slate-100 group-hover:bg-indigo-100 rounded-xl flex items-center justify-center mb-3 transition-all duration-300">
                                <i
                                    class="fa-solid fa-cloud-arrow-up text-xl text-slate-400 group-hover:text-indigo-500 transition-colors duration-300"></i>
                            </div>
                            <p class="text-sm font-semibold text-slate-700 mb-0.5">Click to upload or drag and drop</p>
                            <p class="text-xs text-slate-400">PNG, JPG, PDF up to 5MB</p>
                        </div>
                    </div>
                    <div id="file-preview"
                        class="hidden mt-3 items-center justify-between p-3 bg-indigo-50 rounded-xl border border-indigo-100 file-preview-enter">
                        <div class="flex items-center gap-3">
                            <div
                                class="w-9 h-9 bg-white rounded-lg flex items-center justify-center shadow-sm border border-indigo-100">
                                <i class="fa-solid fa-file-lines text-indigo-500"></i></div>
                            <span id="file-name"
                                class="text-sm font-semibold text-indigo-900 truncate max-w-[180px] sm:max-w-xs">filename.png</span>
                        </div>
                        <button type="button" id="remove-file"
                            class="w-7 h-7 flex items-center justify-center rounded-full text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all duration-200"><i
                                class="fa-solid fa-xmark text-sm"></i></button>
                    </div>
                </div>
                <div class="pt-5 border-t border-slate-100">
                    <button type="submit" id="submit-btn"
                        class="w-full sm:w-auto h-11 px-7 bg-indigo-600 text-white rounded-xl font-semibold text-sm hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-500/20 transition-all duration-200 shadow-lg shadow-indigo-500/15 hover:shadow-xl hover:shadow-indigo-500/20 flex items-center justify-center gap-2 sm:ml-auto hover:-translate-y-0.5">
                        <i class="fa-solid fa-paper-plane text-xs" id="submit-icon"></i>
                        <span id="submit-text">Submit Support Ticket</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-[200] w-full max-w-sm space-y-3 pointer-events-none"></div>

    <script defer src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/support/contact_support.js') }}"></script>
</body>

</html>
