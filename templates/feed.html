<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect | Feed</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/feed.css') }}">
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen" x-data="feedApp()" x-init="init()">

    <!-- TOP NAV -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">

                <a href="/" class="flex items-center gap-2">
                    <div class="p-2 rounded-xl gradient-primary shadow-md">
                        <i data-lucide="graduation-cap" class="h-5 w-5 text-white"></i>
                    </div>
                    <span class="font-bold text-xl">
                        Campus<span class="text-indigo-600">Connect</span>
                    </span>
                </a>

                <div class="flex items-center gap-2">
                    <a href="/feed" class="nav-btn active">
                        <i data-lucide="home" class="h-4 w-4"></i>
                        <span class="hidden sm:inline">Feed</span>
                    </a>
                    <a href="/profile" class="nav-btn">
                        <i data-lucide="user" class="h-4 w-4"></i>
                        <span class="hidden sm:inline">Profile</span>
                    </a>
                    <div class="w-px h-6 bg-slate-200 mx-2"></div>
                    <a href="/login" class="nav-btn logout">
                        <i data-lucide="log-out" class="h-4 w-4"></i>
                        <span class="hidden sm:inline">Logout</span>
                    </a>
                </div>

            </div>
        </div>
    </nav>

    <!-- MAIN FEED -->
    <main class="container mx-auto px-4 py-6 max-w-xl">

        <!-- CREATE POST -->
        <div class="mb-6">
            <div class="bg-white rounded-xl border border-slate-200 shadow-card p-5">
                <div class="flex gap-4">
                    <div class="avatar">AJ</div>

                    <div class="flex-1 space-y-3">
                        <textarea x-model="newPost" class="post-textarea"
                            placeholder="What's on your mind, Alex?"></textarea>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-1.5 text-sm text-slate-500">
                                <i data-lucide="globe" class="h-4 w-4"></i>
                                <span>Visible to all students</span>
                            </div>

                            <div class="flex items-center gap-3">
                                <span class="text-xs text-slate-400" x-text="`${newPost.length}/500`"></span>
                                <button @click="addPost" :disabled="!newPost.trim()" class="btn-post">
                                    <i data-lucide="send" class="h-4 w-4"></i>
                                    Post
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- POSTS -->
        <div class="space-y-4">
            <template x-for="post in posts" :key="post.id">
                <div class="post-card animate-fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="avatar bg-slate-200 text-slate-600" x-text="initials(post.user)"></div>

                        <div class="flex-1">
                            <h3 class="font-semibold" x-text="post.user"></h3>
                            <p class="text-sm text-slate-500" x-text="timeAgo(post.time)"></p>
                        </div>
                    </div>

                    <p class="mb-4 whitespace-pre-wrap" x-text="post.content"></p>

                    <button @click="toggleLike(post)" class="like-btn" :class="post.liked ? 'liked' : ''">
                        <i data-lucide="heart" :class="post.liked ? 'fill-current' : ''" class="h-5 w-5"></i>
                        <span x-text="post.likes"></span>
                    </button>
                </div>
            </template>

            <div x-show="posts.length === 0" class="text-center py-16">
                <i data-lucide="inbox" class="h-16 w-16 mx-auto text-slate-300 mb-4"></i>
                <h3 class="text-lg font-medium text-slate-500">No posts yet</h3>
            </div>
        </div>

    </main>

    <!-- External JS -->
    <script src="{{ url_for('static', filename='js/feed.js') }}"></script>

</body>

</html>
