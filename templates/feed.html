<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Connect | Feed</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/feed.css') }}">
    <script defer src="{{ url_for('static', filename='js/feed.js') }}"></script>
</head>

<body class="bg-white text-slate-900 overflow-x-hidden">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="hidden md:flex flex-col w-[72px] xl:w-[244px] h-screen sticky top-0 border-r bg-white p-3">
        <div class="mb-8 px-3 py-4">
            <h1 class="gradient-text text-xl font-bold hidden xl:block">Campus Connect</h1>
            <div class="xl:hidden text-2xl font-bold gradient-text text-center">CC</div>
        </div>

        <nav class="flex-1 space-y-1">
            <div class="flex items-center gap-4 p-3 rounded-lg bg-slate-100 text-indigo-600">
                <i data-lucide="home"></i>
                <span class="hidden xl:block">Home</span>
            </div>
            <div class="flex items-center gap-4 p-3 rounded-lg hover:bg-slate-50">
                <i data-lucide="search"></i>
                <span class="hidden xl:block">Search</span>
            </div>
            <div onclick="openCreatePost()" class="flex items-center gap-4 p-3 rounded-lg hover:bg-slate-50 cursor-pointer">
                <i data-lucide="plus-square"></i>
                <span class="hidden xl:block">Create</span>
            </div>

            <div class="flex items-center gap-4 p-3 rounded-lg hover:bg-slate-50">
                <i data-lucide="message-circle"></i>
                <span class="hidden xl:block">Messages</span>
            </div>
        </nav>
    </aside>

    <!-- MAIN -->
    <div class="flex-1">

        <main class="max-w-[600px] mx-auto py-4 px-2">
            
            <!-- POSTS -->
            <div id="posts" class="space-y-6"></div>

        </main>
    </div>
</div>

<div id="comment-modal" onclick="closeComments(event)">
    <div class="bg-white w-full max-w-lg rounded-2xl overflow-hidden max-h-[80vh] flex flex-col" onclick="event.stopPropagation()">
        <header class="p-4 border-b flex justify-between items-center">
            <h3 class="font-bold">Comments</h3>
            <button onclick="document.getElementById('comment-modal').style.display='none'"><i data-lucide="x"></i></button>
        </header>
        <div id="modal-comments-list" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" placeholder="Add a comment..." class="flex-1 bg-slate-50 rounded-full px-4 py-2 text-sm outline-none focus:ring-2 ring-indigo-500/20">
            <button class="text-indigo-600 font-bold text-sm px-2">Post</button>
        </div>
    </div>
</div>

<!-- CREATE POST MODAL -->
<div id="create-post-modal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">

    <div class="bg-white w-full max-w-md rounded-2xl p-4">
        <header class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">Create Post</h3>
            <button onclick="closeCreatePost()">
                <i data-lucide="x"></i>
            </button>
        </header>

        <input id="post-image"
            type="text"
            placeholder="Image URL"
            class="w-full mb-3 px-4 py-2 border rounded-lg text-sm"/>

        <textarea id="post-caption"
                placeholder="Write a caption..."
                class="w-full h-28 px-4 py-2 border rounded-lg text-sm resize-none"></textarea>

        <button onclick="submitPost()"
                class="w-full mt-4 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700">
            Post
        </button>
    </div>
</div>


</body>
</html>
