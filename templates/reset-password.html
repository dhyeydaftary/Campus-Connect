<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CampusConnect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script defer src="{{ url_for('static', filename='js/reset-password.js') }}"></script>

</head>

<body class="min-h-screen flex items-center justify-center p-4 gradient-soft text-slate-900">

<div class="w-full max-w-md">
    <div class="bg-white rounded-lg border border-slate-200 shadow-elevated">
        <div class="p-8">

            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold mb-2">
                    <i class="fa-solid fa-key text-3xl text-indigo-600"></i>
                    Reset Your Password
                </h1>
                <p class="text-slate-500" id="reset-subtitle">Enter and confirm your new password below.</p>
            </div>

            <!-- Reset Form -->
            <form id="reset-password-form" class="space-y-4">
                <div>
                    <label for="new-password" class="text-sm font-medium">New Password</label>
                    <div class="relative mt-1">
                        <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input id="new-password" type="password" required class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30" placeholder="Min. 6 characters">
                    </div>
                </div>
                
                <div>
                    <label for="confirm-password" class="text-sm font-medium">Confirm New Password</label>
                    <div class="relative mt-1">
                        <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input id="confirm-password" type="password" required class="h-11 w-full rounded-md border border-slate-200 bg-slate-50 pl-10 pr-3 text-sm focus:ring-2 focus:ring-indigo-500/30" placeholder="Confirm your new password">
                    </div>
                </div>

                <p id="reset-status" class="text-sm text-center pt-2"></p>

                <button
                    type="submit"
                    id="reset-submit-btn"
                    class="w-full h-11 gradient-primary text-white rounded-md flex items-center justify-center gap-2 disabled:opacity-50"
                >
                    <i class="fa-solid fa-check" id="btn-icon"></i>
                    <span id="btn-text">Reset Password</span>
                </button>

                <hr class="my-6 border-slate-200">

                <div class="text-center">
                    <p class="text-slate-500 text-sm">
                        Remember your password? 
                        <a href="{{ url_for('login_page') }}" class="text-indigo-600 font-semibold hover:underline">Login here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="toast-container" class="fixed top-4 right-4 z-[200] w-full max-w-md space-y-3"></div>

<style>
    @keyframes progress {
        from { width: 100%; }
        to { width: 0%; }
    }
</style>

</body>
</html>
